name: Manual Android Release Build Fixed

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (for example v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release title'
        required: true
        default: 'Manual APK Release'
      release_body:
        description: 'Release notes'
        required: false
        default: 'APK artifacts built manually via GitHub Actions.'
      prerelease:
        description: 'Mark this release as prerelease?'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # স্টেপ ১: প্রজেক্টের build.gradle ফাইল রিড করে সঠিক গ্রেডল ভার্সন ডিটেক্ট এবং র‍্যাপার জেনারেট করবে
      - name: Detect AGP and Auto-generate Matching Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "⚠️ gradlew missing! Analyzing project files to match version..."
            AGP_VERSION=$(grep -oP "com.android.tools.build:gradle:\K[0-9.]+" build.gradle || grep -oP "id 'com.android.application' version '\K[0-9.]+" build.gradle || echo "8.2.2")
            echo "🔍 Detected Android Gradle Plugin (AGP) Version: $AGP_VERSION"
            
            if [[ "$AGP_VERSION" == 8.5* || "$AGP_VERSION" == 8.6* ]]; then
              GRADLE_VERSION="8.7"
            elif [[ "$AGP_VERSION" == 8.3* || "$AGP_VERSION" == 8.4* ]]; then
              GRADLE_VERSION="8.4"
            elif [[ "$AGP_VERSION" == 8.2* ]]; then
              GRADLE_VERSION="8.2"
            else
              GRADLE_VERSION="8.5"
            fi
            
            echo "🚀 Generating Gradle Wrapper ($GRADLE_VERSION)..."
            gradle wrapper --gradle-version $GRADLE_VERSION
          else
            echo "✅ gradlew already found in repository."
          fi
          chmod +x gradlew

      # স্টেপ ২: AndroidX এনাবল করা এবং মেমোরি বুস্ট করা
      - name: Auto-generate/Fix gradle.properties
        run: |
          echo "🛠️ Configuring gradle.properties..."
          if [ ! -f "gradle.properties" ]; then
            touch gradle.properties
          fi
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=768m" >> gradle.properties

      # স্টেপ ৩: (মাস্ট-হ্যাভ ফিক্স) গ্লোবাল গ্রেডল ইনিশিয়াল স্ক্রিপ্ট ইনজেক্ট করা, যা রিপোজিটরি লকিং বাইপাস করবে
      - name: Inject Global Repositories Init Script
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              buildscript {
                  repositories {
                      google()
                      mavenCentral()
                  }
              }
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          settingsEvaluated { settings ->
              settings.pluginManagement {
                  repositories {
                      google()
                      mavenCentral()
                  }
              }
              settings.dependencyResolutionManagement {
                  repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
                  repositories {
                      google()
                      mavenCentral()
                      maven { url 'https://jitpack.io' }
                  }
              }
          }
          EOF
          echo "✅ Injected global init.gradle script to force Google & MavenCentral repos."

      # স্টেপ ৪: অটো-ম্যাচড গ্রেডল ও গ্লোবাল ইনজেকশন ব্যবহার করে রিলিজ বিল্ড রান করা
      - name: Clean & Build Split Release APKs
        run: |
          ./gradlew clean :app:assembleRelease --no-daemon --parallel --refresh-dependencies --stacktrace

      # স্টেপ ৫: আর্টফ্যাক্টস ভেরিফাই করা
      - name: Verify Generated APKs
        run: ls -R app/build/outputs/apk/release/

      # স্টেপ ৬: গিটহাবে রিলিজ পুশ করা
      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_name }}
          body: ${{ github.event.inputs.release_body }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: app/build/outputs/apk/release/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
