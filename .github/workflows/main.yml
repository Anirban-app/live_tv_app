name: Dynamic Environment Project Injector & Builder

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release title'
        required: true
        default: 'Premium Live TV Build'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # স্টেপ ১: রানার এনভায়রনমেন্টে ফ্রেশ ব্যাকআপ ডিরেক্টরিতে আপনার রিপোর সোর্স ফাইলগুলো সেভ করা
      - name: Backup Repository Source Files
        run: |
          echo "📦 Creating a safe backup of your repository files..."
          mkdir -p /tmp/user_source/app
          
          # আপনার আসল src এবং gradle কনফিগারেশনগুলো নিরাপদ জায়গায় কপি করা হচ্ছে
          [ -d "app/src" ] && cp -r app/src /tmp/user_source/app/
          [ -f "settings.gradle" ] && cp settings.gradle /tmp/user_source/
          [ -f "build.gradle" ] && cp build.gradle /tmp/user_source/
          [ -f "app/build.gradle" ] && cp app/build.gradle /tmp/user_source/app/
          
          echo "✅ Source files backed up successfully."

      # স্টেপ ২: ফ্রেশ এনভায়রনমেন্টে একটি ক্লীন অ্যান্ড্রয়েড প্রজেক্ট স্ট্রাকচার তৈরি করা
      - name: Scaffold Fresh Android Environment Project
        run: |
          echo "🏗️ Cleaning workspace and building a fresh template..."
          # কারেন্ট ওয়ার্কস্পেস সম্পূর্ণ ফ্লাশ করা
          rm -rf *
          
          # ফ্রেশ অ্যান্ড্রয়েড স্ট্যান্ডার্ড ডিরেক্টরি তৈরি
          mkdir -p app/src/main/java
          mkdir -p app/src/main/res
          
          echo "✅ Fresh workspace scaffolded."

      # স্টেপ ৩: ব্যাকআপ থেকে ফাইল রিড করে ফ্রেশ প্রজেক্টের ভিতরে রিপ্লেস ও মার্জ করা
      - name: Read and Inject Source Files Into New Environment
        run: |
          echo "🔄 Injecting gradle configurations and rewriting src/..."
          
          # ১. রুট লেভেলের কনফিগারেশন ফাইলগুলো রিড করে ফ্রেশ প্রজেক্টে রাইট করা
          if [ -f "/tmp/user_source/settings.gradle" ]; then
            cp /tmp/user_source/settings.gradle ./
          else
            echo "include ':app'" > settings.gradle
          fi
          
          if [ -f "/tmp/user_source/build.gradle" ]; then
            cp /tmp/user_source/build.gradle ./
          fi
          
          # ২. অ্যাপ মডিউলের কনফিগারেশন (app.gradle / app/build.gradle) রিপ্লেস করা
          if [ -f "/tmp/user_source/app/build.gradle" ]; then
            cp /tmp/user_source/app/build.gradle app/
          fi
          
          # ৩. আপনার আসল src/ ফোল্ডারের সমস্ত লজিক, লেআউট, ম্যানিফেস্ট ফ্রেশ প্রজেক্টে সম্পূর্ণ রিপ্লেস করা
          if [ -d "/tmp/user_source/app/src" ]; then
            rm -rf app/src # ফ্রেশ ডামি ডিরেক্টরি ডিলেট করে আপনার আসল সোর্স ইনজেক্ট করা হচ্ছে
            cp -r /tmp/user_source/app/src app/
            echo "🚀 Ultimate Source Injection Complete! All src/ files replaced successfully."
          else
            echo "❌ Error: High-level failure, user app/src directory not found in repository!"
            exit 1
          fi

      # স্টেপ ৪: ফ্রেশ প্রজেক্টের সাথে সামঞ্জস্যপূর্ণ গ্রেডল র‍্যাপার অটো-জেনারেট করা
      - name: Generate Fresh Matching Gradle Wrapper
        run: |
          echo "🔍 Analyzing AGP version to generate matching gradle wrapper..."
          AGP_VERSION=$(grep -oP "com.android.tools.build:gradle:\K[0-9.]+" build.gradle || grep -oP "id 'com.android.application' version '\K[0-9.]+" build.gradle || echo "8.2.2")
          
          if [[ "$AGP_VERSION" == 8.5* || "$AGP_VERSION" == 8.6* ]]; then
            GRADLE_VERSION="8.7"
          elif [[ "$AGP_VERSION" == 8.3* || "$AGP_VERSION" == 8.4* ]]; then
            GRADLE_VERSION="8.4"
          else
            GRADLE_VERSION="8.2"
          fi
          
          gradle wrapper --gradle-version $GRADLE_VERSION
          chmod +x gradlew

      # স্টেপ ৫: অপ্টিমাইজড প্রপার্টিজ ইঞ্জিন সেটআপ করা
      - name: Setup Gradle Properties
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=768m" >> gradle.properties

      # স্টেপ ৬: প্রজেক্ট মোড ফোর্স করে ফাইনাল রিলিজ বিল্ড রান করা
      - name: Build Split Release APKs
        run: |
          ./gradlew clean :app:assembleRelease --no-daemon --parallel --stacktrace -Dorg.gradle.dependency.resolution.control.mode=PREFER_PROJECT
