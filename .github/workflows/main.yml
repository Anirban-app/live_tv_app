name: Super Intelligent Boilerplate Injector & Builder

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release title'
        required: true
        default: 'Premium Live TV Build'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # স্টেপ ১: আপনার রিপোজিটরির মেইন ফাইলগুলো একটি সুরক্ষিত অস্থায়ী ডিরেক্টরিতে ব্যাকআপ নেওয়া
      - name: Secure Original Repository Source
        run: |
          echo "📦 Backing up original repository configurations and source files..."
          mkdir -p /tmp/orig_source/app
          
          [ -d "app/src" ] && cp -r app/src /tmp/orig_source/app/
          [ -f "settings.gradle" ] && cp settings.gradle /tmp/orig_source/
          [ -f "build.gradle" ] && cp build.gradle /tmp/orig_source/
          [ -f "app/build.gradle" ] && cp app/build.gradle /tmp/orig_source/app/
          
          echo "✅ Backup complete."

      # স্টেপ ২: বর্তমান ওয়ার্কস্পেস সম্পূর্ণ ফ্লাশ করে একটি স্ট্যান্ডার্ড Empty Boilerplate তৈরি করা
      - name: Create Fresh Empty Boilerplate Project
        run: |
          echo "🏗️ Scraping workspace and generating a clean boilerplate template..."
          rm -rf *
          
          # অ্যান্ড্রয়েড স্ট্যান্ডার্ড এমটি প্রজেক্ট আর্কিটেকচার তৈরি
          mkdir -p app/src/main/java
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # একটি ডিফল্ট ব্ল্যাঙ্ক বেস তৈরি (যা পরে রিপ্লেস হবে)
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies {} }; allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          
          echo "✅ Empty boilerplate template generated."

      # স্টেপ ৩: গ্লোবাল গ্রেডল সিঙ্ক এনভায়রনমেন্ট রুল সেট করা (যাতে ডিপেনডেন্সি লক না হয়)
      - name: Universal Repository Lock Bypass
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              buildscript {
                  repositories {
                      google()
                      mavenCentral()
                      maven { url "https://plugins.gradle.org/m2/" }
                  }
              }
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          settingsEvaluated { settings ->
              settings.pluginManagement {
                  repositories {
                      google()
                      mavenCentral()
                  }
              }
              settings.dependencyResolutionManagement {
                  repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
                  repositories {
                      google()
                      mavenCentral()
                      maven { url 'https://jitpack.io' }
                  }
              }
          }
          EOF
          echo "✅ Universal init.gradle injected."

      # স্টেপ ৪: ইন্টেলিজেন্ট কোড রিপ্লেসমেন্ট এবং মেইন সোর্স ইনজেকশন
      - name: Parse and Replace Main Configurations & App Files
        run: |
          echo "🔄 Merging main configurations into boilerplate..."
          
          # ১. রুট এবং সেটিংস গ্রেডল ফাইলের মেইন কোড ডাইনামিকালি রিপ্লেস করা
          if [ -f "/tmp/orig_source/settings.gradle" ]; then
            cp /tmp/orig_source/settings.gradle ./settings.gradle
          fi
          
          if [ -f "/tmp/orig_source/build.gradle" ]; then
            cp /tmp/orig_source/build.gradle ./build.gradle
          fi
          
          # ২. app/build.gradle এর ডিপেনডেন্সিস ও কোর প্লাগইন রিপ্লেস করা
          if [ -f "/tmp/orig_source/app/build.gradle" ]; then
            cp /tmp/orig_source/app/build.gradle ./app/build.gradle
          fi
          
          # ৩. আপনার আসল অ্যাপ ফোল্ডারের সমস্ত সোর্স কোড (java, res, manifest) সম্পূর্ণ ইনজেক্ট করা
          if [ -d "/tmp/orig_source/app/src" ]; then
            rm -rf app/src
            cp -r /tmp/orig_source/app/src app/
            echo "🚀 [SUCCESS] App folder source and dependencies merged into boilerplate perfectly!"
          else
            echo "❌ Critical Error: Original app/src not found!"
            exit 1
          fi

      # স্টেপ ৫: রিকোয়ার্ড প্লাগইন অনুযায়ী গ্রেডল র‍্যাপার আপডেট করা
      - name: Auto-Detect and Upgrade Gradle Wrapper
        run: |
          echo "🔍 Detecting correct gradle version from your project requirements..."
          AGP_VERSION=$(grep -oP "com.android.tools.build:gradle:\K[0-9.]+" build.gradle || grep -oP "id 'com.android.application' version '\K[0-9.]+" build.gradle || echo "8.2.2")
          
          if [[ "$AGP_VERSION" == 8.5* || "$AGP_VERSION" == 8.6* ]]; then
            GRADLE_VERSION="8.7"
          elif [[ "$AGP_VERSION" == 8.3* || "$AGP_VERSION" == 8.4* ]]; then
            GRADLE_VERSION="8.4"
          else
            GRADLE_VERSION="8.2"
          fi
          
          echo "🔄 Upgrading Gradle wrapper to version $GRADLE_VERSION..."
          gradle wrapper --gradle-version $GRADLE_VERSION
          chmod +x gradlew

      # স্টেপ ৬: প্রপার্টিজ ইঞ্জিন অপ্টিমাইজেশন
      - name: Setup Optimized Gradle Properties
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=768m" >> gradle.properties

      # স্টেপ ৭: একদম ফ্রেশ গ্রেডল সিঙ্কের মাধ্যমে ০% এরর টার্গেটে রিলিজ বিল্ড রান করা
      - name: Run Zero-Error Release Build
        run: |
          ./gradlew clean :app:assembleRelease --no-daemon --parallel --stacktrace
