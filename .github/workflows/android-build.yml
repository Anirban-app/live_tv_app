name: Manual Android Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (for example v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release title'
        required: true
        default: 'Manual APK Release'
      release_body:
        description: 'Release notes'
        required: false
        default: 'APK artifacts built manually via GitHub Actions.'
      prerelease:
        description: 'Mark this release as prerelease?'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # বিল্ট-ইন গ্রেডল ক্যাশ যা অ্যাকশনকে আরও ফাস্ট করবে

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # অ্যাপ সাইজ সর্বোচ্চ ছোট করার জন্য বিল্ডের সময় split এবং প্রোগার্ড এনাবল করার কমান্ড (প্রজেক্টে কনফিগার করা থাকলে অটো কাজ করবে)
      - name: Build release APKs per ABI
        run: |
          ./gradlew :app:assembleRelease --no-daemon --parallel --refresh-dependencies

      - name: Check generated APKs
        run: ls -R app/build/outputs/apk/release/

      - name: Publish release with APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_name }}
          body: ${{ github.event.inputs.release_body }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: app/build/outputs/apk/release/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
